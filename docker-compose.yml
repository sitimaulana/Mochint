version: '3.8'

services:
  app:
    build: .
    container_name: app-mochint
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://root:password@db:3306/beauty_clinic
      - PORT=5000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  # Database MySQL
  db:
    image: mysql:8.0
    container_name: db-mochint
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: beauty_clinic
    volumes:
      - ./mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 5s
      retries: 10
    networks:
      - app-network

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: pma-mochint
    environment:
      PMA_HOST: db
    ports:
      - "8081:80"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge