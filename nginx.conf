events {}

http {
  server {
    listen 80;

    # APP
    location / {
      proxy_pass http://app:5000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # PHPMYADMIN
    location /phpmyadmin/ {
      proxy_pass http://phpmyadmin:80/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}